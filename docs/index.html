<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB Speech Tracker | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #0f1117;
            --card-bg: #1a1d27;
            --border-color: #2d333f;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-orange: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            line-height: 1.5;
            padding: 2rem;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-main); }
        .logo span { color: var(--accent-blue); }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
        }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-success { color: var(--accent-green); }
        .status-success .status-dot { background-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }
        .status-failed { color: var(--accent-red); }
        .status-failed .status-dot { background-color: var(--accent-red); }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: var(--text-main); }

        section {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        h2 { font-size: 1.1rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .data-table th { text-align: left; padding: 0.75rem; color: var(--text-dim); border-bottom: 1px solid var(--border-color); }
        .data-table td { padding: 0.75rem; border-bottom: 1px solid var(--border-color); }
        
        .bank-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--accent-blue);
            color: white;
            font-weight: bold;
            display: inline-block;
        }

        .speech-link { color: var(--text-main); text-decoration: none; font-weight: 500; }
        .speech-link:hover { color: var(--accent-blue); text-decoration: underline; }

        footer { text-align: center; color: var(--text-dim); font-size: 0.75rem; margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">CB <span>SPEECH</span> TRACKER</div>
            <div id="health-status" class="status-badge">
                <div class="status-dot"></div>
                <span id="status-text">Loading...</span>
            </div>
        </header>

        <div class="grid-stats" id="bank-stats-grid">
            <!-- Stats Grid -->
        </div>

        <section>
            <h2>📋 Recent Collection Logs</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Status</th>
                        <th>New Items</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="log-body"></tbody>
            </table>
        </section>

        <section>
            <h2>🎙️ Recent Speeches (Last 7 Days)</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 80px;">Bank</th>
                        <th style="width: 150px;">Speaker</th>
                        <th>Title</th>
                        <th style="width: 120px;">Date</th>
                    </tr>
                </thead>
                <tbody id="speech-body"></tbody>
            </table>
        </section>

        <footer>
            Last Sync: <span id="last-updated">-</span>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                // 1. Status
                const healthEl = document.getElementById('health-status');
                document.getElementById('status-text').innerText = data.health === 'success' ? 'All Systems Operational' : 'Issues Detected';
                healthEl.className = 'status-badge ' + (data.health === 'success' ? 'status-success' : 'status-failed');
                document.getElementById('last-updated').innerText = new Date(data.last_updated).toLocaleString();

                // 2. Stats Grid (Including BOC)
                const statsGrid = document.getElementById('bank-stats-grid');
                let statsHtml = `<div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${data.total_speeches.toLocaleString()}</div></div>`;
                
                // 정해진 순서대로 출력 (FRB, ECB, BOE, BOJ, RBA, BOC)
                const bankOrder = ['FRB', 'ECB', 'BOE', 'BOJ', 'RBA', 'BOC'];
                bankOrder.forEach(bank => {
                    const count = data.bank_stats[bank] || 0;
                    statsHtml += `<div class="stat-card"><div class="stat-label">${bank}</div><div class="stat-value">${count.toLocaleString()}</div></div>`;
                });
                statsGrid.innerHTML = statsHtml;

                // 3. Logs
                const logBody = document.getElementById('log-body');
                logBody.innerHTML = data.recent_logs.map(log => `
                    <tr>
                        <td>${new Date(log.started_at).toLocaleDateString()}</td>
                        <td style="color: ${log.status === 'success' ? 'var(--accent-green)' : 'var(--accent-red)'}">${log.status.toUpperCase()}</td>
                        <td>+${log.total_new}</td>
                        <td style="font-size: 0.7rem; color: var(--text-dim);">${log.error || 'Normal'}</td>
                    </tr>
                `).join('');

                // 4. Recent Speeches (Last 7 Days)
                const speechBody = document.getElementById('speech-body');
                if (data.recent_speeches && data.recent_speeches.length > 0) {
                    speechBody.innerHTML = data.recent_speeches.map(s => `
                        <tr>
                            <td><span class="bank-badge">${s.bank}</span></td>
                            <td style="font-weight: 600;">${s.speaker || '-'}</td>
                            <td><a href="${s.url}" target="_blank" class="speech-link">${s.title}</a></td>
                            <td>${s.date}</td>
                        </tr>
                    `).join('');
                } else {
                    speechBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-dim);">No speeches found in the last 7 days.</td></tr>';
                }

            } catch (error) {
                console.error('Error:', error);
            }
        }
        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
