name: Central Bank Speech Collection

on:
  schedule:
    - cron: '0 22 * * *' # 매일 한국 시간 아침 7시 (UTC 22:00)
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 커밋 & 푸시 권한

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Run Collection Pipeline
        env:
          PYTHONPATH: .
        run: |
          python -m src.collector --mode recent --no-analyze

      - name: Generate Dashboard Data
        run: |
          python3 src/generate_dashboard_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/speeches.db docs/data.json
          git commit -m "chore: auto-update speech data and dashboard stats [skip ci]" || echo "No changes to commit"
          git push origin master
